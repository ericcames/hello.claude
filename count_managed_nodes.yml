---
- name: Count AAP Managed Nodes
  hosts: localhost
  connection: local
  gather_facts: true
  vars:
    controller_hostname: "{{ lookup('env', 'CONTROLLER_HOST') }}"
    controller_username: "{{ lookup('env', 'CONTROLLER_USERNAME') }}"
    controller_password: "{{ lookup('env', 'CONTROLLER_PASSWORD') }}"
    controller_validate_certs: false
    # Nodes to exclude from managed node count
    exclude_patterns:
      - localhost
      - 127.0.0.1
      - ::1

  tasks:
    - name: Validate required credentials and environment
      ansible.builtin.assert:
        that:
          - controller_hostname is defined
          - controller_hostname | length > 0
          - controller_hostname is not match('^\s*$')
          - controller_username is defined
          - controller_username | length > 0
          - controller_password is defined
          - controller_password | length > 0
          - exclude_patterns is defined
          - exclude_patterns | length > 0
        success_msg: "Pre-flight validation passed: All required credentials are set"
        fail_msg: "Pre-flight validation failed: Missing required environment variables (CONTROLLER_HOST, CONTROLLER_USERNAME, or CONTROLLER_PASSWORD)"
        quiet: false

    - name: Get all inventories from AAP
      ansible.builtin.uri:
        url: "{{ controller_hostname }}/api/controller/v2/inventories/"
        method: GET
        user: "{{ controller_username }}"
        password: "{{ controller_password }}"
        force_basic_auth: true
        validate_certs: "{{ controller_validate_certs }}"
        return_content: true
      register: inventories_response

    - name: Get all hosts from AAP
      ansible.builtin.uri:
        url: "{{ controller_hostname }}/api/controller/v2/hosts/"
        method: GET
        user: "{{ controller_username }}"
        password: "{{ controller_password }}"
        force_basic_auth: true
        validate_certs: "{{ controller_validate_certs }}"
        return_content: true
      register: hosts_response

    - name: Handle paginated host results
      ansible.builtin.uri:
        url: "{{ hosts_response.json.next }}"
        method: GET
        user: "{{ controller_username }}"
        password: "{{ controller_password }}"
        force_basic_auth: true
        validate_certs: "{{ controller_validate_certs }}"
        return_content: true
      register: hosts_page
      loop: "{{ range(0, (hosts_response.json.count / 200) | int) | list }}"
      when: hosts_response.json.next is defined
      vars:
        hosts_response: "{{ hosts_page if hosts_page is defined else hosts_response }}"

    - name: Build list of unique managed nodes
      ansible.builtin.set_fact:
        all_host_names: "{{ hosts_response.json.results | map(attribute='name') | list }}"
        unique_nodes: "{{ hosts_response.json.results |
                         map(attribute='name') |
                         list |
                         difference(exclude_patterns) |
                         unique |
                         sort }}"

    - name: Build host to connection target mapping
      ansible.builtin.set_fact:
        host_connection_map: "{{ host_connection_map | default([]) + [connection_info] }}"
      loop: "{{ hosts_response.json.results }}"
      vars:
        parsed_vars: "{{ item.variables | from_yaml if item.variables else {} }}"
        connection_target: "{{ parsed_vars.ansible_host | default(item.name) }}"
        connection_info:
          hostname: "{{ item.name }}"
          connection_target: "{{ connection_target }}"
          variables: "{{ item.variables }}"

    - name: Extract unique connection targets (IPs/FQDNs)
      ansible.builtin.set_fact:
        all_connection_targets: "{{ host_connection_map | map(attribute='connection_target') | list }}"
        unique_connection_targets: "{{ host_connection_map |
                                       map(attribute='connection_target') |
                                       list |
                                       difference(exclude_patterns) |
                                       difference(['127.0.0.1', '::1']) |
                                       unique |
                                       sort }}"
        unique_hostnames_vs_targets:
          unique_hostnames: "{{ hosts_response.json.results | map(attribute='name') | list | difference(exclude_patterns) | unique | length }}"
          unique_targets: "{{ host_connection_map | map(attribute='connection_target') | list | difference(exclude_patterns) | difference(['127.0.0.1', '::1']) | unique | length }}"
          potential_duplicates: "{{ (hosts_response.json.results | map(attribute='name') | list | difference(exclude_patterns) | unique | length) - (host_connection_map | map(attribute='connection_target') | list | difference(exclude_patterns) | difference(['127.0.0.1', '::1']) | unique | length) }}"

    - name: Perform DNS lookups for hostnames
      ansible.builtin.command: getent hosts {{ item.hostname }}
      register: dns_lookups
      loop: "{{ host_connection_map }}"
      loop_control:
        label: "{{ item.hostname }}"
      ignore_errors: true
      changed_when: false
      when:
        - item.hostname not in exclude_patterns
        - item.hostname != item.connection_target or not (item.connection_target | ansible.utils.ipaddr)

    - name: Perform DNS lookups for connection targets
      ansible.builtin.command: getent hosts {{ item.connection_target }}
      register: dns_target_lookups
      loop: "{{ host_connection_map }}"
      loop_control:
        label: "{{ item.connection_target }}"
      ignore_errors: true
      changed_when: false
      when:
        - item.connection_target not in exclude_patterns
        - item.connection_target not in ['127.0.0.1', '::1']
        - not (item.connection_target | ansible.utils.ipaddr)

    - name: Build DNS resolution results
      ansible.builtin.set_fact:
        dns_resolution_map: "{{ dns_resolution_map | default([]) + [dns_entry] }}"
      loop: "{{ host_connection_map }}"
      vars:
        hostname_lookup: "{{ dns_lookups.results | selectattr('item.hostname', 'equalto', item.hostname) | first | default({}) }}"
        target_lookup: "{{ dns_target_lookups.results | selectattr('item.connection_target', 'equalto', item.connection_target) | first | default({}) }}"
        hostname_ip: "{{ hostname_lookup.stdout.split()[0] | default('unresolved') if hostname_lookup.rc is defined and hostname_lookup.rc == 0 else 'unresolved' }}"
        target_ip: "{{ target_lookup.stdout.split()[0] | default(item.connection_target if (item.connection_target | ansible.utils.ipaddr) else 'unresolved') if target_lookup.rc is defined and target_lookup.rc == 0 else (item.connection_target if (item.connection_target | ansible.utils.ipaddr) else 'unresolved') }}"
        dns_entry:
          hostname: "{{ item.hostname }}"
          connection_target: "{{ item.connection_target }}"
          hostname_resolved_ip: "{{ hostname_ip }}"
          target_resolved_ip: "{{ target_ip }}"
          dns_match: "{{ hostname_ip == target_ip if hostname_ip != 'unresolved' and target_ip != 'unresolved' else 'N/A' }}"
      when: item.hostname not in exclude_patterns

    - name: Analyze DNS resolution results
      ansible.builtin.set_fact:
        dns_analysis:
          total_hosts_checked: "{{ dns_resolution_map | default([]) | length }}"
          hostname_resolvable: "{{ dns_resolution_map | default([]) | selectattr('hostname_resolved_ip', '!=', 'unresolved') | list | length }}"
          hostname_unresolvable: "{{ dns_resolution_map | default([]) | selectattr('hostname_resolved_ip', 'equalto', 'unresolved') | list | length }}"
          target_resolvable: "{{ dns_resolution_map | default([]) | selectattr('target_resolved_ip', '!=', 'unresolved') | list | length }}"
          target_unresolvable: "{{ dns_resolution_map | default([]) | selectattr('target_resolved_ip', 'equalto', 'unresolved') | list | length }}"
          dns_mismatches: "{{ dns_resolution_map | default([]) | selectattr('dns_match', 'equalto', false) | list | length }}"
          unique_resolved_ips: "{{ (dns_resolution_map | default([]) | map(attribute='target_resolved_ip') | list + dns_resolution_map | default([]) | map(attribute='hostname_resolved_ip') | list) | difference(['unresolved']) | unique | length }}"
      when: dns_resolution_map is defined and dns_resolution_map | length > 0

    - name: Set default DNS analysis if no hosts checked
      ansible.builtin.set_fact:
        dns_analysis:
          total_hosts_checked: 0
          hostname_resolvable: 0
          hostname_unresolvable: 0
          target_resolvable: 0
          target_unresolvable: 0
          dns_mismatches: 0
          unique_resolved_ips: 0
        dns_resolution_map: []
      when: dns_resolution_map is not defined or dns_resolution_map | length == 0

    - name: Get subscription information
      ansible.builtin.uri:
        url: "{{ controller_hostname }}/api/controller/v2/config/"
        method: GET
        user: "{{ controller_username }}"
        password: "{{ controller_password }}"
        force_basic_auth: true
        validate_certs: "{{ controller_validate_certs }}"
        return_content: true
      register: aap_config

    - name: Get host metrics from AAP
      ansible.builtin.uri:
        url: "{{ controller_hostname }}/api/controller/v2/host_metrics/"
        method: GET
        user: "{{ controller_username }}"
        password: "{{ controller_password }}"
        force_basic_auth: true
        validate_certs: "{{ controller_validate_certs }}"
        return_content: true
      register: host_metrics_response

    - name: Build host metrics analysis
      ansible.builtin.set_fact:
        active_host_metrics: "{{ host_metrics_response.json.results |
                                 selectattr('deleted', 'equalto', false) |
                                 list }}"
        active_host_metrics_names: "{{ host_metrics_response.json.results |
                                       selectattr('deleted', 'equalto', false) |
                                       map(attribute='hostname') |
                                       list |
                                       difference(exclude_patterns) |
                                       sort }}"

    - name: Get unified jobs statistics
      ansible.builtin.uri:
        url: "{{ controller_hostname }}/api/controller/v2/unified_jobs/?page_size=200&order_by=-id"
        method: GET
        user: "{{ controller_username }}"
        password: "{{ controller_password }}"
        force_basic_auth: true
        validate_certs: "{{ controller_validate_certs }}"
        return_content: true
      register: unified_jobs_response

    - name: Get job templates
      ansible.builtin.uri:
        url: "{{ controller_hostname }}/api/controller/v2/job_templates/"
        method: GET
        user: "{{ controller_username }}"
        password: "{{ controller_password }}"
        force_basic_auth: true
        validate_certs: "{{ controller_validate_certs }}"
        return_content: true
      register: job_templates_response

    - name: Build job statistics analysis
      ansible.builtin.set_fact:
        total_jobs: "{{ unified_jobs_response.json.count }}"
        recent_jobs_sample: "{{ unified_jobs_response.json.results }}"
        successful_jobs: "{{ unified_jobs_response.json.results | selectattr('status', 'equalto', 'successful') | list | length }}"
        failed_jobs: "{{ unified_jobs_response.json.results | selectattr('status', 'equalto', 'failed') | list | length }}"
        running_jobs: "{{ unified_jobs_response.json.results | selectattr('status', 'in', ['running', 'pending', 'waiting']) | list | length }}"
        canceled_jobs: "{{ unified_jobs_response.json.results | selectattr('status', 'equalto', 'canceled') | list | length }}"
        total_job_templates: "{{ job_templates_response.json.count }}"

    - name: Calculate job success rate
      ansible.builtin.set_fact:
        job_success_rate: "{{ ((successful_jobs | int) / ((successful_jobs | int) + (failed_jobs | int)) * 100) | round(2) if ((successful_jobs | int) + (failed_jobs | int)) > 0 else 0 }}"

    - name: Get job host summaries from recent jobs
      ansible.builtin.uri:
        url: "https://{{ controller_hostname }}{{ item.related.job_host_summaries }}"
        method: GET
        user: "{{ controller_username }}"
        password: "{{ controller_password }}"
        force_basic_auth: true
        validate_certs: "{{ controller_validate_certs }}"
        return_content: true
      register: job_host_summaries_results
      loop: "{{ unified_jobs_response.json.results | selectattr('type', 'equalto', 'job') | selectattr('status', 'in', ['successful', 'failed']) | selectattr('related.job_host_summaries', 'defined') | list }}"
      loop_control:
        label: "Job {{ item.id }}"
      ignore_errors: true
      when:
        - unified_jobs_response.json.results | selectattr('type', 'equalto', 'job') | selectattr('status', 'in', ['successful', 'failed']) | list | length > 0

    - name: Build unique host names from job events (main_jobevents)
      ansible.builtin.set_fact:
        all_job_host_summaries: "{{ job_host_summaries_results.results |
                                     default([]) |
                                     selectattr('json', 'defined') |
                                     map(attribute='json.results') |
                                     flatten |
                                     list }}"
      when: job_host_summaries_results is defined

    - name: Extract unique host names from job events
      ansible.builtin.set_fact:
        unique_job_event_hosts: "{{ all_job_host_summaries |
                                    default([]) |
                                    map(attribute='host_name') |
                                    unique |
                                    list |
                                    difference(exclude_patterns) |
                                    sort }}"
        total_job_host_summaries: "{{ all_job_host_summaries | default([]) | length }}"
      when: all_job_host_summaries is defined

    - name: Set default if no job host summaries found
      ansible.builtin.set_fact:
        unique_job_event_hosts: []
        total_job_host_summaries: 0
      when: job_host_summaries_results is not defined or job_host_summaries_results.results is not defined

    - name: Validate subscription compliance
      ansible.builtin.assert:
        that:
          - inventories_response.json is defined
          - hosts_response.json is defined
          - aap_config.json is defined
          - host_metrics_response.json is defined
          - unique_nodes is defined
          - unique_nodes | length >= 0
          - active_host_metrics_names is defined
          - active_host_metrics_names | length >= 0
          - (active_host_metrics_names | length) <= (aap_config.json.license_info.instance_count | default(999999) | int)
        success_msg: "Compliance check passed: {{ active_host_metrics_names | length }} active host metrics within {{ aap_config.json.license_info.instance_count | default('unlimited') }} subscription limit"
        fail_msg: "Compliance check FAILED: Active host metrics ({{ active_host_metrics_names | length }}) EXCEEDS subscription limit ({{ aap_config.json.license_info.instance_count | default('N/A') }})"
        quiet: false

    - name: Display managed node report
      ansible.builtin.debug:
        msg:
          - "========================================"
          - "AAP MANAGED NODE & AUTOMATION REPORT"
          - "========================================"
          - "Controller: {{ controller_hostname }}"
          - "AAP Version: {{ aap_config.json.version | default('N/A') }}"
          - "License Type: {{ aap_config.json.license_info.license_type | default('N/A') }}"
          - ""
          - "INVENTORY SUMMARY:"
          - "  Total Inventories: {{ inventories_response.json.count }}"
          - "  Total Host Entries: {{ hosts_response.json.count }}"
          - ""
          - "HOST METRICS (AAP 2.4+):"
          - "  Total Host Metrics: {{ host_metrics_response.json.count }}"
          - "  Active (Non-Deleted): {{ active_host_metrics | length }}"
          - "  Active Managed Nodes (excl. localhost): {{ active_host_metrics_names | length }}"
          - ""
          - "MANAGED NODE COUNT:"
          - "  Inventory-Based Count: {{ unique_nodes | length }}"
          - "  Host Metrics-Based Count: {{ active_host_metrics_names | length }}"
          - "  Subscription Limit: {{ aap_config.json.license_info.instance_count | default('Unlimited') }}"
          - "  Available: {{ (aap_config.json.license_info.instance_count | default(999999) | int) - (active_host_metrics_names | length) }}"
          - ""
          - "UNIQUE IP/TARGET ADDRESS ANALYSIS:"
          - "  Unique Hostnames: {{ unique_hostnames_vs_targets.unique_hostnames }}"
          - "  Unique Connection Targets (ansible_host): {{ unique_hostnames_vs_targets.unique_targets }}"
          - "  Potential Multi-Homed Hosts: {{ unique_hostnames_vs_targets.potential_duplicates }}"
          - "  Connection Targets: {{ unique_connection_targets | join(', ') if unique_connection_targets | length > 0 else 'None' }}"
          - ""
          - "DNS RESOLUTION CHECK:"
          - "  Total Hosts Checked: {{ dns_analysis.total_hosts_checked }}"
          - "  Hostnames Resolvable: {{ dns_analysis.hostname_resolvable }}"
          - "  Hostnames Unresolvable: {{ dns_analysis.hostname_unresolvable }}"
          - "  Targets Resolvable: {{ dns_analysis.target_resolvable }}"
          - "  Targets Unresolvable: {{ dns_analysis.target_unresolvable }}"
          - "  DNS Mismatches: {{ dns_analysis.dns_mismatches }}"
          - "  Unique DNS-Resolved IPs: {{ dns_analysis.unique_resolved_ips }}"
          - ""
          - "JOB EXECUTION STATISTICS (main_jobevents):"
          - "  Total Jobs (All Time): {{ total_jobs }}"
          - "  Recent Jobs Analyzed: {{ recent_jobs_sample | length }}"
          - "  Successful Jobs: {{ successful_jobs }} ({{ job_success_rate }}%)"
          - "  Failed Jobs: {{ failed_jobs }}"
          - "  Running/Pending Jobs: {{ running_jobs }}"
          - "  Canceled Jobs: {{ canceled_jobs }}"
          - "  Total Job Templates: {{ total_job_templates }}"
          - ""
          - "AUTOMATED HOSTS FROM JOB EVENTS:"
          - "  Total Job Host Summaries: {{ total_job_host_summaries }}"
          - "  Unique Hosts Automated (excl. localhost): {{ unique_job_event_hosts | length }}"
          - "  Hosts: {{ unique_job_event_hosts | join(', ') if unique_job_event_hosts | length > 0 else 'None' }}"
          - ""
          - "========================================"
          - "HOST METRICS DETAILS:"
          - "{{ active_host_metrics | to_nice_yaml }}"
          - ""
          - "INVENTORY-BASED MANAGED NODES LIST:"
          - "{{ unique_nodes | to_nice_yaml }}"
          - ""
          - "Note: Host Metrics count is the authoritative managed node count for AAP 2.4+."
          - "Count excludes localhost and loopback addresses."
          - "Each unique identifiable node counts once, even if in multiple inventories."
          - "Job statistics based on unified_jobs API (backed by main_jobevents table)."
          - "Automated hosts extracted from job_host_summaries (aggregated main_jobevents data)."
          - "IP/Target analysis uses ansible_host variable or hostname as connection target."
          - "Multi-homed detection: difference between unique hostnames and unique targets."
          - "DNS check resolves hostnames and targets to IPs, identifies mismatches and unresolvable hosts."
          - "========================================"

    - name: Create summary artifact
      ansible.builtin.set_stats:
        data:
          managed_node_count_inventory_based: "{{ unique_nodes | length }}"
          managed_node_count_host_metrics: "{{ active_host_metrics_names | length }}"
          managed_node_count_job_events: "{{ unique_job_event_hosts | length }}"
          unique_hostnames: "{{ unique_hostnames_vs_targets.unique_hostnames }}"
          unique_connection_targets: "{{ unique_hostnames_vs_targets.unique_targets }}"
          potential_multi_homed_hosts: "{{ unique_hostnames_vs_targets.potential_duplicates }}"
          dns_total_hosts_checked: "{{ dns_analysis.total_hosts_checked }}"
          dns_hostname_resolvable: "{{ dns_analysis.hostname_resolvable }}"
          dns_hostname_unresolvable: "{{ dns_analysis.hostname_unresolvable }}"
          dns_target_resolvable: "{{ dns_analysis.target_resolvable }}"
          dns_target_unresolvable: "{{ dns_analysis.target_unresolvable }}"
          dns_mismatches: "{{ dns_analysis.dns_mismatches }}"
          dns_unique_resolved_ips: "{{ dns_analysis.unique_resolved_ips }}"
          total_host_metrics: "{{ host_metrics_response.json.count }}"
          active_host_metrics: "{{ active_host_metrics | length }}"
          subscription_limit: "{{ aap_config.json.license_info.instance_count | default(0) }}"
          total_inventories: "{{ inventories_response.json.count }}"
          total_host_entries: "{{ hosts_response.json.count }}"
          total_jobs: "{{ total_jobs }}"
          successful_jobs: "{{ successful_jobs }}"
          failed_jobs: "{{ failed_jobs }}"
          running_jobs: "{{ running_jobs }}"
          canceled_jobs: "{{ canceled_jobs }}"
          job_success_rate: "{{ job_success_rate }}"
          total_job_templates: "{{ total_job_templates }}"
          total_job_host_summaries: "{{ total_job_host_summaries }}"
          unique_automated_hosts: "{{ unique_job_event_hosts | join(',') }}"
          connection_targets_list: "{{ unique_connection_targets | join(',') }}"
          controller_host: "{{ controller_hostname }}"
          aap_version: "{{ aap_config.json.version | default('N/A') }}"
          report_timestamp: "{{ ansible_date_time.iso8601 }}"
        per_host: false
...
