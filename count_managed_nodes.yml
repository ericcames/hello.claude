---
- name: Count AAP Managed Nodes
  hosts: localhost
  connection: local
  gather_facts: true
  vars:
    controller_hostname: "{{ lookup('env', 'CONTROLLER_HOST') }}"
    controller_username: "{{ lookup('env', 'CONTROLLER_USERNAME') }}"
    controller_password: "{{ lookup('env', 'CONTROLLER_PASSWORD') }}"
    controller_validate_certs: false
    # Nodes to exclude from managed node count
    exclude_patterns:
      - localhost
      - 127.0.0.1
      - ::1

  tasks:
    - name: Validate required credentials and environment
      ansible.builtin.assert:
        that:
          - controller_hostname is defined
          - controller_hostname | length > 0
          - controller_hostname is not match('^\s*$')
          - controller_username is defined
          - controller_username | length > 0
          - controller_password is defined
          - controller_password | length > 0
          - exclude_patterns is defined
          - exclude_patterns | length > 0
        success_msg: "Pre-flight validation passed: All required credentials are set"
        fail_msg: "Pre-flight validation failed: Missing required environment variables (CONTROLLER_HOST, CONTROLLER_USERNAME, or CONTROLLER_PASSWORD)"
        quiet: false

    - name: Get all inventories from AAP
      ansible.builtin.uri:
        url: "{{ controller_hostname }}/api/controller/v2/inventories/"
        method: GET
        user: "{{ controller_username }}"
        password: "{{ controller_password }}"
        force_basic_auth: true
        validate_certs: "{{ controller_validate_certs }}"
        return_content: true
      register: inventories_response

    - name: Get all hosts from AAP
      ansible.builtin.uri:
        url: "{{ controller_hostname }}/api/controller/v2/hosts/"
        method: GET
        user: "{{ controller_username }}"
        password: "{{ controller_password }}"
        force_basic_auth: true
        validate_certs: "{{ controller_validate_certs }}"
        return_content: true
      register: hosts_response

    - name: Handle paginated host results
      ansible.builtin.uri:
        url: "{{ hosts_response.json.next }}"
        method: GET
        user: "{{ controller_username }}"
        password: "{{ controller_password }}"
        force_basic_auth: true
        validate_certs: "{{ controller_validate_certs }}"
        return_content: true
      register: hosts_page
      loop: "{{ range(0, (hosts_response.json.count / 200) | int) | list }}"
      when: hosts_response.json.next is defined
      vars:
        hosts_response: "{{ hosts_page if hosts_page is defined else hosts_response }}"

    - name: Build list of unique managed nodes
      ansible.builtin.set_fact:
        all_host_names: "{{ hosts_response.json.results | map(attribute='name') | list }}"
        unique_nodes: "{{ hosts_response.json.results |
                         map(attribute='name') |
                         list |
                         difference(exclude_patterns) |
                         unique |
                         sort }}"

    - name: Get subscription information
      ansible.builtin.uri:
        url: "{{ controller_hostname }}/api/controller/v2/config/"
        method: GET
        user: "{{ controller_username }}"
        password: "{{ controller_password }}"
        force_basic_auth: true
        validate_certs: "{{ controller_validate_certs }}"
        return_content: true
      register: aap_config

    - name: Get host metrics from AAP
      ansible.builtin.uri:
        url: "{{ controller_hostname }}/api/controller/v2/host_metrics/"
        method: GET
        user: "{{ controller_username }}"
        password: "{{ controller_password }}"
        force_basic_auth: true
        validate_certs: "{{ controller_validate_certs }}"
        return_content: true
      register: host_metrics_response

    - name: Build host metrics analysis
      ansible.builtin.set_fact:
        active_host_metrics: "{{ host_metrics_response.json.results |
                                 selectattr('deleted', 'equalto', false) |
                                 list }}"
        active_host_metrics_names: "{{ host_metrics_response.json.results |
                                       selectattr('deleted', 'equalto', false) |
                                       map(attribute='hostname') |
                                       list |
                                       difference(exclude_patterns) |
                                       sort }}"

    - name: Validate subscription compliance
      ansible.builtin.assert:
        that:
          - inventories_response.json is defined
          - hosts_response.json is defined
          - aap_config.json is defined
          - host_metrics_response.json is defined
          - unique_nodes is defined
          - unique_nodes | length >= 0
          - active_host_metrics_names is defined
          - active_host_metrics_names | length >= 0
          - (active_host_metrics_names | length) <= (aap_config.json.license_info.instance_count | default(999999) | int)
        success_msg: "Compliance check passed: {{ active_host_metrics_names | length }} active host metrics within {{ aap_config.json.license_info.instance_count | default('unlimited') }} subscription limit"
        fail_msg: "Compliance check FAILED: Active host metrics ({{ active_host_metrics_names | length }}) EXCEEDS subscription limit ({{ aap_config.json.license_info.instance_count | default('N/A') }})"
        quiet: false

    - name: Display managed node report
      ansible.builtin.debug:
        msg:
          - "========================================"
          - "AAP MANAGED NODE REPORT"
          - "========================================"
          - "Controller: {{ controller_hostname }}"
          - "AAP Version: {{ aap_config.json.version | default('N/A') }}"
          - "License Type: {{ aap_config.json.license_info.license_type | default('N/A') }}"
          - ""
          - "INVENTORY SUMMARY:"
          - "  Total Inventories: {{ inventories_response.json.count }}"
          - "  Total Host Entries: {{ hosts_response.json.count }}"
          - ""
          - "HOST METRICS (AAP 2.4+):"
          - "  Total Host Metrics: {{ host_metrics_response.json.count }}"
          - "  Active (Non-Deleted): {{ active_host_metrics | length }}"
          - "  Active Managed Nodes (excl. localhost): {{ active_host_metrics_names | length }}"
          - ""
          - "MANAGED NODE COUNT:"
          - "  Inventory-Based Count: {{ unique_nodes | length }}"
          - "  Host Metrics-Based Count: {{ active_host_metrics_names | length }}"
          - "  Subscription Limit: {{ aap_config.json.license_info.instance_count | default('Unlimited') }}"
          - "  Available: {{ (aap_config.json.license_info.instance_count | default(999999) | int) - (active_host_metrics_names | length) }}"
          - ""
          - "========================================"
          - "HOST METRICS DETAILS:"
          - "{{ active_host_metrics | to_nice_yaml }}"
          - ""
          - "INVENTORY-BASED MANAGED NODES LIST:"
          - "{{ unique_nodes | to_nice_yaml }}"
          - ""
          - "Note: Host Metrics count is the authoritative managed node count for AAP 2.4+."
          - "Count excludes localhost and loopback addresses."
          - "Each unique identifiable node counts once, even if in multiple inventories."
          - "========================================"

    - name: Create summary artifact
      ansible.builtin.set_stats:
        data:
          managed_node_count_inventory_based: "{{ unique_nodes | length }}"
          managed_node_count_host_metrics: "{{ active_host_metrics_names | length }}"
          total_host_metrics: "{{ host_metrics_response.json.count }}"
          active_host_metrics: "{{ active_host_metrics | length }}"
          subscription_limit: "{{ aap_config.json.license_info.instance_count | default(0) }}"
          total_inventories: "{{ inventories_response.json.count }}"
          total_host_entries: "{{ hosts_response.json.count }}"
          controller_host: "{{ controller_hostname }}"
          aap_version: "{{ aap_config.json.version | default('N/A') }}"
          report_timestamp: "{{ ansible_date_time.iso8601 }}"
        per_host: false
...
